{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section Restaurant</title>

  <!-- Lien Bootstrap local ou CDN -->
  <link rel="stylesheet" href="{% static 'auth_app/bootstrap.min.css' %}">

  <!-- Ton style -->
  <style>
    /* SECTION PERSONNALISÉE */
    .hero-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background-color: #fff3e0;
      padding: 50px 0;
    }

    .hero-text {
      font-family: 'Poppins', sans-serif;
      color: #333;
    }

    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 2.8rem;
      margin-bottom: 20px;
    }

    .hero-text p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 30px;
    }

    .btn-main {
      background-color: #ff7b00;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 6px;
      transition: 0.3s;
    }

    .btn-main:hover {
      background-color: #e96c00;
    }

    .hero-img img {
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    @media (max-width: 992px) {
      .hero-section {
        text-align: center;
      }
      .hero-img {
        margin-top: 30px;
      }
    }
    .hero-section{
            opacity: 0;
            transform: translateY(-5px);
            animation: fadeInTitle 0.6s ease-out forwards;
    }

        @keyframes fadeInTitle {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
  </style>
</head>
<body style="background-color: #fff3e0;">

  <section class="hero-section container">
    <div class="row align-items-center">
      
      <!-- Texte à gauche -->
      <div class="col-lg-6 col-md-12 hero-text">
        <h1>PIZZA MAMA est une restaurant en charge des fast foods</h1>
        <p>Découvrez nos plats délicieux préparés avec des ingrédients frais et locaux. 
           Nous vous offrons une expérience culinaire unique.</p>
        <p>Commadez dès maintenant</p>
        
        <a href="{% url 'menu' %}" class="btn-main">Voir menu</a>
      </div>

      <!-- Image à droite -->
      <div class="col-lg-6 col-md-12 hero-img">
        <img src="{% static 'image/livreur.jpeg' %}" alt="logo" >
      </div>
    </div>
  </section>

</body>
</html>
